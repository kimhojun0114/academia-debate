services:
  - type: web
    name: academia-debate
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT debate_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBATE_SECRET_KEY
        generateValue: true
      - key: DEBATE_ADMIN_CODE
        sync: false
